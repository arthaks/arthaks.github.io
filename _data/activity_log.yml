      lead: 这篇随笔有不少摘抄，但最让我在意的是关于“黑暗”的部分。
      note: 人应该勇于控制自己的情绪，勇于舍弃烂人烂事。沉没成本再高，也要有计划、有勇气地舍弃；也应该把注意力放回积累与健康。
