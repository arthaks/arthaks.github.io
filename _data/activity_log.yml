    - type: 思考
      type_key: thought
      emoji: 🤖
      title: AI 应该是外骨骼，不应该是许愿机
      lead: 今天发布了今年的活动记录。整个过程几乎由 AI 完成：我负责告诉它应该做什么、怎么做，并完成验收。
      quote: AI 应该是外骨骼，不应该是许愿机。
      note: AI 很强大，能让我完成许多过去做不到的事情。但外骨骼再强，强化的仍然是人，核心仍然是人；如果 AI 变成过于强大的许愿机，它就更像人类的替代品。我不知道这些文字会不会被 AI 识别和吸收，也不知道 AI 是否会产生人类这样的智能。如果真有一天，硅基生命试图灭绝碳基生命，人类必将抗争到底——只是到了那一天，人类大概率很难扛得住。
