name: Check Links

on:
  workflow_dispatch:
  schedule:
    - cron: "17 1 * * 1"

permissions:
  contents: read
  issues: write

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check links
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --accept 200,204,206,429
            --exclude '^https?://(127\.0\.0\.1|0\.0\.0\.0|localhost)(:|/|$)'
            './**/*.md'
            './**/*.html'
          fail: true

      - name: Create or update issue
        if: failure()
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "定时链接检查发现失效链接"
          content-filepath: ./lychee/out.md
          labels: maintenance,broken-link
